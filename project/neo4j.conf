# ~/neo4j/project/neo4j.conf
# Custom Neo4j configuration mounted into the container at /conf.
# NEO4J_CONF=/conf in docker-compose.yml tells the image to read this file.

# ---- HTTP connector ------------------------------------------------------
# Bind only to localhost inside the container. Docker still maps host
# 7474 → container 7474, so you can reach it at http://localhost:7474.
# Setting this silences the "X-Forward headers accepted from any source"
# security warnings.
dbms.connector.http.bind_address=127.0.0.1:7474

# ---- JVM options ---------------------------------------------------------
# Required by the Graph Data Science plugin on macOS (Apple Silicon or Intel)
# to avoid a HotSpot SAA attach issue. See:
# https://neo4j.com/docs/graph-data-science/current/installation/
server.jvm.additional=-Djol.skipHotspotSAAttach=true

# ---- Memory --------------------------------------------------------------
# Page cache size. Tune to ~25% of available RAM for a small dev box.
server.memory.pagecache.size=512M

# ---- Networking ----------------------------------------------------------
# Bind to all interfaces inside the container (Docker maps host ports).
server.default_listen_address=0.0.0.0

# ---- Plugin / log / import directories -----------------------------------
server.directories.plugins=/plugins
server.directories.logs=/logs
server.directories.import=/import

# ---- Procedure security --------------------------------------------------
# Allow unrestricted execution of GDS procedures (Community Edition).
dbms.security.procedures.unrestricted=gds.*

# ---- GDS model store location --------------------------------------------
# Uncomment if you use gds.model.* procedures and want them to persist
# between container restarts.
# gds.model.store_location=/var/lib/neo4j/gds/models

# ---- GDS metrics ---------------------------------------------------------
# Disable the optional metrics subsystem if you don't need Prometheus
# export. Removes the "gds.model.store_location is missing" warning.
# gds.metrics.enabled=false

# ---- Usage reporting -----------------------------------------------------
# Disable anonymous usage data sent to Neo4j.
dbms.usage_report.enabled=false
